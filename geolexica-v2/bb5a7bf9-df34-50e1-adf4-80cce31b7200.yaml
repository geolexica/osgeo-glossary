data:
  definition:
  - content: OGC standard that describes how to systematically produce structured
      raster cartographic data from a service and return them to a client
  examples: []
  id: '302'
  notes:
  - content: Defines an interface for reading and writing geospatial data as “coverages”
      across the web. The Web Coverage Service provides an interface allowing requests
      for geographical coverages across the web using platform-independent calls.
      The coverages are objects (or images) in a geographical area
