data:
  definition:
  - content: |-
      feature that acts as a function to return values from its range for any direct position within its spatial,
      temporal or spatiotemporal domain
  examples:
  - content: Examples include a raster image, polygon overlay or digital elevation
      matrix.
  id: '61'
  notes:
  - content: In other words, a coverage is a feature that has multiple values for
      each attribute type, where each direct position within the geometric representation
      of the feature has a single value for each attribute type.
  sources:
  - origin:
      ref: ISO 19123:2005
      locality:
        type: clause
        reference_from: 4.1.7
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: coverage
  language_code: eng
