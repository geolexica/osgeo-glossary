data:
  definition:
  - content: coordinate system that is related to an object by a datum
  examples: []
  id: '59'
  notes:
  - content: Geodetic and vertical datums are referred to as reference frames.
  - content: For geodetic and vertical reference frames, the object will be the Earth.
      In planetary applications, geodetic and vertical reference frames may be applied
      to other celestial bodies.
