name: build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate concepts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - run: gem install glossarist

      - name: Validate with glossarist
        run: glossarist validate .

  test-package:
    name: Test GCR package
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - run: gem install glossarist

      - name: Test package build
        run: |
          glossarist package . -o test-osgeo.gcr \
            --shortname osgeo \
            --version "0.0.0-test"

      - name: Verify package
        run: test -f test-osgeo.gcr && echo "Package built successfully"

  build-release:
    name: Build and release
    needs: validate
    uses: geolexica/ci/.github/workflows/glossary-build.yml@main

  trigger-deploy:
    name: Trigger downstream repositories
    needs: build-release
    uses: geolexica/ci/.github/workflows/glossary-trigger.yml@main
    with:
      repository: geolexica/osgeo.geolexica.org
    secrets:
      token: ${{ secrets.GLOSSARIST_CI_PAT_TOKEN }}
